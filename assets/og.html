<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink:    #0C1116;
    --panel:  #131A22;
    --grid:   #202B36;
    --line:   #2B3947;
    --paper:  #EDF1F5;
    --mute:   #9DAEBD;
    --amber:  #E8B23A;
    --teal:   #3FB0A0;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(1100px 560px at 84% -12%, rgba(232,178,58,0.16), transparent 60%),
      radial-gradient(820px 520px at 2% 4%, rgba(63,176,160,0.14), transparent 55%),
      linear-gradient(180deg, #0d131a 0%, #0C1116 100%);
    font-family: var(--sans);
    color: var(--paper);
    -webkit-font-smoothing: antialiased;
  }

  /* plotted-grid signature */
  .plot { position: absolute; inset: 0; width: 1200px; height: 630px; }
  .plot .grid line { stroke: var(--grid); stroke-width: 1; }
  .plot .curve {
    fill: none; stroke: var(--amber); stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round;
    filter: drop-shadow(0 0 14px rgba(232,178,58,0.45));
  }
  .plot .dot { fill: var(--teal); }

  .frame {
    position: absolute; inset: 0;
    padding: 84px 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 20px; }
  .mark {
    width: 74px; height: 74px; border-radius: 18px;
    background: var(--ink); border: 1px solid var(--line);
    box-shadow: 0 18px 44px -22px rgba(0,0,0,0.8);
  }
  .wordmark { font-size: 62px; font-weight: 800; letter-spacing: -0.045em; line-height: 1; }

  .headline { max-width: 940px; }
  .headline h1 {
    font-size: 60px; font-weight: 800; letter-spacing: -0.032em; line-height: 1.08;
  }
  .headline .accent { color: var(--amber); }
  .headline p {
    margin-top: 24px;
    font-size: 29px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--mute); line-height: 1.35; max-width: 38ch;
  }

  .chips { display: flex; align-items: center; gap: 13px; }
  .chip {
    display: inline-flex; align-items: center; gap: 11px;
    padding: 12px 20px;
    border: 1px solid var(--line); border-radius: 999px;
    background: rgba(19,26,34,0.6);
    font-size: 22px; font-weight: 600; letter-spacing: -0.01em; color: var(--mute);
  }
  .chip .dot { width: 11px; height: 11px; border-radius: 50%; }
  .chip .dot--amber { background: var(--amber); box-shadow: 0 0 0 4px rgba(232,178,58,0.15); }
  .chip .dot--teal  { background: var(--teal);  box-shadow: 0 0 0 4px rgba(63,176,160,0.16); }
</style>
</head>
<body>
  <svg class="plot" viewBox="0 0 1200 630" preserveAspectRatio="none" aria-hidden="true">
    <g class="grid">
      <line x1="0"    y1="105" x2="1200" y2="105"/>
      <line x1="0"    y1="210" x2="1200" y2="210"/>
      <line x1="0"    y1="315" x2="1200" y2="315"/>
      <line x1="0"    y1="420" x2="1200" y2="420"/>
      <line x1="0"    y1="525" x2="1200" y2="525"/>
      <line x1="200"  y1="0"   x2="200"  y2="630"/>
      <line x1="400"  y1="0"   x2="400"  y2="630"/>
      <line x1="600"  y1="0"   x2="600"  y2="630"/>
      <line x1="800"  y1="0"   x2="800"  y2="630"/>
      <line x1="1000" y1="0"   x2="1000" y2="630"/>
    </g>
    <path class="curve" d="M-20 470 C 160 430, 300 500, 470 430 C 620 368, 720 250, 900 200 C 1020 166, 1120 150, 1240 120"/>
    <circle class="dot" cx="470" cy="430" r="9"/>
  </svg>

  <div class="frame">
    <div class="brand">
      <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" rx="7" fill="#0C1116"/>
        <path d="M5 7 V26 H27" fill="none" stroke="#2B3947" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M6 24 L13 16.5 L19 20.5 L27 6" fill="none" stroke="#E8B23A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="13" cy="16.5" r="2.6" fill="#3FB0A0"/>
      </svg>
      <span class="wordmark">inflection</span>
    </div>

    <div class="headline">
      <h1>Understand the economy,<br><span class="accent">one day at a time.</span></h1>
      <p>A daily macro concept — with a model you can play with and the math worked out.</p>
    </div>

    <div class="chips">
      <span class="chip"><span class="dot dot--amber"></span>inflation &amp; money</span>
      <span class="chip"><span class="dot dot--teal"></span>interactive models</span>
      <span class="chip"><span class="dot dot--amber"></span>worked examples</span>
      <span class="chip"><span class="dot dot--teal"></span>offline</span>
    </div>
  </div>
</body>
</html>
