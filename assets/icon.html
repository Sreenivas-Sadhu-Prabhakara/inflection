<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0C1116; }
  body { display: grid; place-items: center; }
  /* 12% safe padding on each side -> mark fills the middle 76vmin */
  .mark { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
    <path d="M5 7 V26 H27" fill="none" stroke="#2B3947" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M6 24 L13 16.5 L19 20.5 L27 6" fill="none" stroke="#E8B23A" stroke-width="2.9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="13" cy="16.5" r="2.7" fill="#3FB0A0"/>
  </svg>
</body>
</html>
